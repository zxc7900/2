name: Windows RDP Server

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Core RDP Settings
        shell: pwsh
        run: .github/workflows/scripts/win-configure-rdp.ps1

      - name: Create RDP User with Secure Password
        shell: pwsh
        run: .github/workflows/scripts/win-create-user.ps1

      - name: Install Tailscale
        shell: pwsh
        run: .github/workflows/scripts/win-install-tailscale.ps1

      - name: Establish Tailscale Connection
        shell: pwsh
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: .github/workflows/scripts/win-establish-ts.ps1

      - name: Verify RDP Accessibility
        shell: pwsh
        run: .github/workflows/scripts/win-verify-rdp.ps1

      # 新增步骤：显示处理器核心信息
      - name: Display CPU Core Information
        shell: pwsh
        run: |
          $cpuInfo = Get-CimInstance Win32_Processor
          Write-Host "=== CPU 核心信息 ==="
          Write-Host "物理核心数: $($cpuInfo.NumberOfCores)"
          Write-Host "逻辑处理器数: $($cpuInfo.NumberOfLogicalProcessors)"
          Write-Host "处理器名称: $($cpuInfo.Name)"
          Write-Host "最大时钟速度: $($cpuInfo.MaxClockSpeed) MHz"
          Write-Host "===================="

      # 新增步骤：下载、解压并安装NAT123到D盘
      - name: Download, Extract and Install NAT123 on D Drive
        shell: pwsh
        run: |
          Write-Host "正在下载NAT123客户端..."
          $downloadUrl = "http://download.nat123.com:211/nat123_V1.260108_NET4.zip"
          $zipPath = "D:\nat123_V1.260108_NET4.zip"
          $extractPath = "D:\nat123_extracted"
          $installPath = "D:\nat123_install"
          
          try {
            # 检查D盘是否存在
            if (-not (Test-Path "D:\")) {
              Write-Warning "D盘不存在，创建临时目录在C盘..."
              $extractPath = "$env:TEMP\nat123_extracted"
              $installPath = "$env:TEMP\nat123_install"
              $zipPath = "$env:TEMP\nat123_V1.260108_NET4.zip"
            } else {
              Write-Host "D盘存在，将在D盘进行操作..."
            }
            
            # 创建安装目录
            if (Test-Path $installPath) {
              Remove-Item -Path $installPath -Recurse -Force
            }
            New-Item -ItemType Directory -Path $installPath -Force
            
            # 创建解压目录
            if (Test-Path $extractPath) {
              Remove-Item -Path $extractPath -Recurse -Force
            }
            New-Item -ItemType Directory -Path $extractPath -Force
            
            # 下载NAT123压缩包
            Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath -UseBasicParsing
            Write-Host "NAT123下载完成，开始解压到 $extractPath ..."
            
            # 解压ZIP文件
            Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
            Write-Host "NAT123解压完成，复制文件到安装目录 $installPath ..."
            
            # 将解压后的文件复制到安装目录
            Copy-Item -Path "$extractPath\*" -Destination $installPath -Recurse -Force
            Write-Host "NAT123文件已复制到安装目录: $installPath"
          } catch {
            Write-Error "下载、解压或安装NAT123过程中发生错误: $_"
          }

      # 新增步骤：启动NAT123并自动登录
      - name: Launch NAT123 and Auto Login
        shell: pwsh
        run: |
          Write-Host "正在启动NAT123并自动登录..."
          try {
            # 检查NAT123客户端是否存在
            $nat123ClientPath = "D:\nat123_install\nat123client.exe"
            
            if (Test-Path $nat123ClientPath) {
              Write-Host "找到NAT123客户端: $nat123ClientPath，正在启动..."
              
              # 启动NAT123客户端
              Start-Process -FilePath $nat123ClientPath
              Write-Host "NAT123客户端已启动，等待程序加载..."
              Start-Sleep -Seconds 10
              
              # 尝试自动登录（使用PowerShell调用COM对象或其他自动化方式）
              # 由于NAT123可能不直接支持命令行登录，我们尝试使用SendKeys模拟键盘输入
              Write-Host "尝试自动登录NAT123..."
              
              # 导入System.Windows.Forms命名空间用于SendKeys
              Add-Type -AssemblyName System.Windows.Forms
              
              # 等待窗口激活
              Start-Sleep -Seconds 3
              
              # 发送账号和密码（这假设NAT123的登录界面在前台）
              # 注意：这种方法可能不稳定，取决于具体的应用程序行为
              [System.Windows.Forms.SendKeys]::SendWait("2522")  # 输入账号
              Start-Sleep -Seconds 1
              [System.Windows.Forms.SendKeys]::SendWait("{TAB}")  # 移动到密码字段
              Start-Sleep -Seconds 1
              [System.Windows.Forms.SendKeys]::SendWait("shi12345")  # 输入密码
              Start-Sleep -Seconds 1
              [System.Windows.Forms.SendKeys]::SendWait("{ENTER}")  # 登录
              
              Write-Host "已发送登录凭据：账号 2522，密码 shi12345"
              Write-Host "如果自动登录失败，请手动完成登录。"
            } else {
              Write-Warning "未找到NAT123客户端: $nat123ClientPath"
              Write-Warning "请检查安装过程或手动查找nat123client.exe文件。"
              
              # 列出安装目录中的文件
              if (Test-Path "D:\nat123_install\") {
                Write-Host "D:\nat123_install\ 目录中的文件："
                Get-ChildItem -Path "D:\nat123_install\" -Recurse | ForEach-Object { Write-Host $_.FullName }
              } else {
                Write-Host "D:\nat123_install\ 目录不存在。"
              }
            }
          } catch {
            Write-Error "启动NAT123或自动登录过程中发生错误: $_"
          }

      - name: Maintain Connection
        shell: pwsh
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: vum"
          Write-Host "Password: $(echo $env:RDP_CREDS)"
          Write-Host "==================`n"
          while ($true) {
            Write-Host "[$(Get-Date)] RDP Active - Use Ctrl+C in workflow to terminate"
            Start-Sleep -Seconds 300
          }
